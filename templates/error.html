{% extends "base.html" %}
{% block title %}Error {{ code }} — ALSONDOS TRAVEL{% endblock %}
{% block content %}
<div class="card" style="text-align:center;padding:60px;max-width:500px;margin:60px auto">
  <div style="font-size:64px;margin-bottom:16px">{% if code==404 %}🔍{% else %}⚠️{% endif %}</div>
  <h2 style="color:var(--navy);margin-bottom:8px">Error {{ code }}</h2>
  <p class="text-muted" style="margin-bottom:24px">{{ msg }}</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">← Back to Dashboard</a>
</div>
{% endblock %}
